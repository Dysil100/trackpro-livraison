name: Deploy to track.freedomver.se

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Create production .env
        run: |
          cat > .env << 'EOF'
          PORT=3000
          DB_PATH=./data/trackpro.db
          JWT_SECRET=${{ secrets.JWT_SECRET || 'trackpro_prod_secret_2024' }}
          JWT_EXPIRES_IN=7d
          EOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:       ${{ secrets.FTP_SERVER }}
          username:     ${{ secrets.FTP_USERNAME }}
          password:     ${{ secrets.FTP_PASSWORD }}
          server-dir:   ${{ secrets.FTP_PATH }}
          protocol:     ftps
          port:         21
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/.cache/**
            data/**
            uploads/**
            scripts/add-github-secrets.js
            /tmp/**
            *.log
